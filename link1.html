<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinoire Atelier</title>
  <style>
    /* Reset dasar */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      color: #000;
      min-height: 100vh;
      background-color: #8FA276;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      /* animasi */
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1s ease-out forwards;
    }

    /* Header */
    header {
      background: #F3EDE0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      /* animasi */
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeInDown 1s ease-out forwards;
    }

    header .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
    }

    header .logo h1 {
      font-size: 20px;
      font-weight: bold;
      user-select: none;
    }

    .bg h1 {
      margin-bottom: 15px;
      font-family: 'Courier New', Courier, monospace;
    }



    /* Search bar */
    .search-container {
      flex: 1;
      max-width: 400px;
      margin: 0 24px;
      position: relative;
    }

    .search-container input {
      width: 100%;
      padding: 8px 36px 8px 16px;
      border-radius: 999px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .search-container svg {
      width: 18px;
      height: 18px;
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      stroke: #666;
    }

    /* Nav */
    nav {
      display: flex;
      gap: 24px;
    }

    nav a {
      color: black;
      transition: 0.2s;
    }

    nav a:hover {
      color: rgba(0, 0, 0, 0.7);
    }

    nav svg {
      width: 24px;
      height: 24px;
    }

    /* Main */
    main {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 24px;
      flex: 1;

    }

    main h1 {
      text-align: center;
      margin-bottom: 0px;
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      font-size: 50px;

    }

    .btn a {
      background-color: transparent;
      padding: 10px 30px;
      color: #F3EDE0;
      text-decoration: none;
      font-family: 'Courier New', Courier, monospace;
      border-radius: 20px;
      font-size: 1.2rem;
      margin-bottom: 50px;
      border: 2px solid #F3EDE0;
      transition: background-color 0.5s, color 0.5s, filter 0.5s;
      animation: fadeIn 0.5s ease-out forwards;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .btn a:hover {
      background-color: #ffffff;
      filter: drop-shadow(0 0 5px #ffffff) drop-shadow(0 0 10px #ffffff);
      color: #000000;
      margin-top: 20px;
    }

    #productGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 20px;
      margin-top: 20px;
      justify-content: center;
    }

    #productGrid:hover .product-item {
      filter: blur(1.5px);
      transition: 0.3s;
    }

    #productGrid .product-item:hover {
      filter: none;
      transform: scale(1.10);
      z-index: 2;
    }

.product-item {
  backdrop-filter: blur(5px);
  background: #F3EDE0;
  padding: 20px;
  margin-top: 20px;
  border-radius: 12px;
  color: #464f3b;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  transition: transform 0.2s, background-color 0.3s, color 0.3s;
  max-width: 340px;
  justify-self: center;
  
  /* Layout Flexbox agar tombol bisa didorong ke bawah */
  display: flex;
  flex-direction: column;
  min-height: 520px; /* Saya sesuaikan tingginya agar proporsional */
}

.product-item img {
  width: 100%;
  border-radius: 8px;
  margin-bottom: 12px;
}

.product-item h2 {
  font-weight: bold;
  font-size: 20px;
  user-select: none;
  margin-bottom: 5px;
  text-align: left;
}

.product-item p {
  font-size: 18px;
  margin-bottom: 20px;
  text-align: left;
}

/* Efek Hover pada Kartu */
.product-item:hover {
  transform: scale(1.05);
  background-color: #5e6e4a;
  filter: drop-shadow(0 10px 15px #000000b2);
  color: white;
}

/* Container Tombol */
.btnlink {
  margin-top: auto; /* Trik kunci: mendorong tombol ke dasar */
  text-align: left;
}

.btnlink a {
  display: inline-block;
  background-color: transparent;
  padding: 10px 30px;
  color: inherit; /* Mengikuti warna teks parent (hitam/putih saat hover) */
  text-decoration: none;
  font-family: 'Courier New', Courier, monospace;
  border-radius: 20px;
  font-size: 1rem;
  border: 2px solid currentColor; /* Garis mengikuti warna teks */
  transition: all 0.5s;
}

/* Efek Hover Khusus Tombol */
.btnlink a:hover {
  background-color: #ffffff;
  color: #8FA276;
  border-color: #ffffff;
  filter: drop-shadow(0 0 10px #ffffff);
}

    .btnlink a:hover {
      background-color: #ffffff;
      filter: drop-shadow(0 0 5px #ffffff) drop-shadow(0 0 10px #ffffff);
      color: #8FA276;
      border: 2px solid #f0f0f082;
      margin-top: 20px;
    }

    /* Footer */
    footer {
      background: #F3EDE0;
      padding: 20px;
      display: flex;
      justify-content: center;
      position: sticky;
      top: 100vh;
      text-align: center;
      /* animasi */
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 1s ease-out forwards;
      animation-delay: 0.8s;
    }

    footer a svg {
      width: 28px;
      height: 28px;
      fill: black;
      transition: 0.2s;
    }

    .copi {
      color: black;
      font-size: large;
      position: relative;
      text-align: center;
      align-items: center;
      font-family: monospace;
      font-weight: normal;
    }

    /* Keyframes untuk animasi */
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInDown {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">
      <img src="img/logo.jpg" alt="Logo" />
      <h1>Vinoire Atelier</h1>
    </div>

    <div class="search-container">
      <input type="search" id="searchInput" placeholder="Cari produk" aria-label="Cari produk">
      <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
    </div>


  </header>

  <main>
    <div class="bg">
      <h1>Gamis</h1>
    </div>
    <div class="btn"><a href="index.html">Kembali</a></div>
    <section id="productGrid">
      <article class="product-item" data-name="Gadamis Malaka Gamis Malaika" data-link="https://s.shopee.co.id/7ponwBceKH">
        <img src="imgpr/Gamis.png" alt="Produk 1">
        <h2>Gadamis Malaka Gamis Malaika</h2>
        <p>Rp215.000 - Rp240.000</p>
        <div class="btnlink"><a href="https://s.shopee.co.id/7ponwBceKH">Gazz</a></div>
      </article>

      <article class="product-item" data-name="gamis plisket dress wanita" data-link="https://s.shopee.co.id/2LTrO71Jhf">
        <img src="imgpr/Gamis 1.png" alt="Produk 2">
        <h2>gamis plisket dress wanita</h2>
        <p>Rp174.700 - Rp204.979</p>
        <div class="btnlink"><a href="https://s.shopee.co.id/2LTrO71Jhf">Gazz</a></div>
      </article>

      <article class="product-item" data-name="DRESS SAHARA Gamis Janggan" data-link="https://s.shopee.co.id/2g6hn0BXHQ">
        <img src="imgpr/Gamis 2.png" alt="Produk 3">
        <h2>DRESS SAHARA Gamis Janggan</h2>
        <p>Rp140.000 - Rp175.000</p>
        <div class="btnlink"><a href="https://s.shopee.co.id/2g6hn0BXHQ">Gazz</a></div>
      </article>

        <article class="product-item" data-name="Gamis Brokat Mewah Kekinian" data-link="https://s.shopee.co.id/9ztIWY3AzA">
        <img src="imgpr/Gamis 3.png" alt="Produk 4">
        <h2>Gamis Brokat Mewah Kekinian</h2>
        <p>Rp120.000</p>
        <div class="btnlink"><a href="https://s.shopee.co.id/9ztIWY3AzA">Gazz</a></div>
      </article>

  </main>

  <footer>
    <div class="copi">
      <p>&copy; 2026 Kelvin</p>
    </div>

  </footer>
  <script>
    const searchInput = document.getElementById('searchInput');
    const products = document.querySelectorAll('.product-item');

    searchInput.addEventListener('input', () => {
      const filter = searchInput.value.toLowerCase().trim();
      products.forEach(product => {
        const name = product.getAttribute('data-name').toLowerCase();
        if (name.includes(filter)) {
          product.style.display = '';
        } else {
          product.style.display = 'none';
        }
      });
    });
  </script>

</body>

</html>
